name: Main Auto Release

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: main-auto-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-assets:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-${SHORT_SHA}"
          NAME="Main build ${SHORT_SHA}"
          VERSION="${SHORT_SHA}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release app (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project notchi/notchi.xcodeproj \
            -scheme notchi \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/notchi-release" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package ZIP and DMG
        id: package
        shell: bash
        run: |
          set -euo pipefail
          PRODUCTS_DIR="$RUNNER_TEMP/notchi-release/Build/Products/Release"
          APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 1 -type d -name '*.app' | head -n 1)"

          if [[ -z "$APP_PATH" ]]; then
            echo "Could not find built .app in $PRODUCTS_DIR" >&2
            ls -la "$PRODUCTS_DIR" || true
            exit 1
          fi

          VERSION="${{ steps.meta.outputs.version }}"
          OUT_DIR="$RUNNER_TEMP/release-assets"
          ZIP_PATH="$OUT_DIR/Notchi-main-${VERSION}.zip"
          DMG_PATH="$OUT_DIR/Notchi-main-${VERSION}.dmg"

          mkdir -p "$OUT_DIR"

          # Ensure the app bundle has a complete signature (prevents "damaged" launch errors).
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          ditto -ck --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "$ZIP_PATH"

          DMG_STAGING="$RUNNER_TEMP/notchi-dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          ditto "$APP_PATH" "$DMG_STAGING/$(basename "$APP_PATH")"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "Notchi" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          generate_release_notes: true
          body: |
            Automated build from `main` commit `${{ github.sha }}`.

            Note: This artifact is unsigned and not notarized. If macOS blocks launch after download:

            `xattr -dr com.apple.quarantine /Applications/notchi.app`
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.dmg_path }}
          overwrite_files: true
